name: PR Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  test:
    name: pnpm run test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ship_test
          POSTGRES_USER: ship
          POSTGRES_PASSWORD: ship_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ship -d ship_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ship:ship_dev_password@localhost:5432/ship_test
      DATABASE_URL_TEST: postgresql://ship:ship_dev_password@localhost:5432/ship_test
      NODE_ENV: test
      SESSION_SECRET: github-actions-test-session-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + sdk packages
        # @ship/api's test suite imports @ryanjagger/ship-sdk (sdk.test.ts), a
        # workspace package resolved via its built dist. Build it here alongside
        # @ship/shared so the api tests can resolve it.
        run: pnpm run build:shared && pnpm --filter @ryanjagger/ship-sdk build

      - name: Run database migrations
        run: pnpm --filter @ship/api db:migrate

      - name: Run tests
        run: pnpm run test

  ttfe-drill:
    name: pnpm drill ttfe
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ship_test
          POSTGRES_USER: ship
          POSTGRES_PASSWORD: ship_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ship -d ship_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # The drill migrates + seeds this database itself, then spawns the built
      # API against it. WEBHOOKS_DELIVERY_ENABLED / WEBHOOK_ALLOW_PRIVATE_TARGETS /
      # WEBHOOK_SECRET_ENC_KEY are set on the spawned API by drill/src/env.ts.
      DATABASE_URL: postgresql://ship:ship_dev_password@localhost:5432/ship_test
      NODE_ENV: test
      SESSION_SECRET: github-actions-ttfe-drill-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + sdk + api
        # The drill packs/installs the SDK (install stage) and spawns the built
        # api/dist/index.js, so all three must be built before it runs.
        run: pnpm run build:shared && pnpm --filter @ryanjagger/ship-sdk build && pnpm --filter @ship/api build

      - name: Run the Time-to-First-Event drill
        run: pnpm drill ttfe

      - name: Upload drill results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ttfe-drill-results
          path: drill/results/ttfe.json
          if-no-files-found: warn
